version: 2
project_name: tracelog

# Frontend must be built before GoReleaser embeds it. CI runs `npm run build` in web/ first.
# `internal/hub/dist/` is gitignored (hashed asset names change each build); do not commit it.
# Local: `make web-build` or `cd web && npm run build` before `goreleaser release` / `go build`.

builds:
  - id: tracelog
    main: ./cmd/tracelog
    binary: tracelog
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: tracelog
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: tudorAbrudan
    # Must match the GitHub repository name (e.g. traceLog, not only the go module path).
    name: traceLog
  draft: false
  prerelease: auto
