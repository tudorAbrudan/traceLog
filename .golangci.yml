linters:
  # Without disable-all, `enable` only adds linters; errcheck would stay on from defaults.
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - misspell

linters-settings:
  gosec:
    excludes:
      - G104  # unhandled errors on deferred Close() calls

issues:
  exclude-dirs:
    - web
    - docs
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
